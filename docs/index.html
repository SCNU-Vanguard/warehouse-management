<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>物资管理</title>
    <link rel="stylesheet" href="./styles.css?v=20260707-labels-compact-1" />
  </head>
  <body>
    <div class="brandV" aria-hidden="true"><img class="brandVImage" src="./assets/flag.jpg" alt="" /></div>

    <header class="topbar">
      <div>
        <p class="topBrand">VANGUARD</p><p class="eyebrow">Feishu Bitable Source</p>
        <h1>物资管理</h1>
      </div>
      <button id="refreshButton" class="iconButton" type="button" title="刷新">刷新</button>
    </header>

    <main class="layout">
      <section class="summaryGrid" aria-label="库存总览">
        <article class="metric metricBlue">
          <span>物资种类</span>
          <strong id="metricItems">0</strong>
        </article>
        <article class="metric metricGreen">
          <span>当前总库存</span>
          <strong id="metricStock">0</strong>
        </article>
        <article class="metric metricAmber">
          <span>今日入库</span>
          <strong id="metricInbound">0</strong>
        </article>
        <article class="metric metricRed">
          <span>今日出库</span>
          <strong id="metricOutbound">0</strong>
        </article>
      </section>

      <section class="workspace">
        <aside class="leftPane">
          <div class="toolbar">
            <label class="searchBox">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="编号 / 名称 / 分类" autocomplete="off" />
            </label>
            <button id="scanButton" class="primaryButton" type="button">扫码</button>
          </div>

          <div id="scannerPanel" class="scannerPanel hidden">
            <video id="scannerVideo" playsinline muted></video>
            <div class="scannerControls">
              <input id="manualCodeInput" type="text" placeholder="手动输入物资编号" />
              <button id="manualCodeButton" type="button">打开</button>
              <button id="stopScanButton" type="button">停止</button>
            </div>
            <p id="scannerStatus" class="muted">等待扫码</p>
          </div>

          <div id="itemList" class="itemList" aria-live="polite"></div>
        </aside>

        <section class="detailPane" aria-label="物资详情">
          <div id="emptyDetail" class="emptyState">
            <strong>选择一个物资</strong>
            <span>扫码或从列表打开后进行入库、出库。</span>
          </div>

          <div id="itemDetail" class="detail hidden">
            <div class="detailHeader">
              <div>
                <p id="detailCode" class="eyebrow"></p>
                <h2 id="detailName"></h2>
              </div>
              <div class="detailHeaderActions">
                <button id="qrButton" class="plainButton" type="button">二维码</button>
                <div class="stockBadge">
                  <span>当前库存</span>
                  <strong id="detailStock">0</strong>
                </div>
              </div>
            </div>

            <div class="metaGrid">
              <div><span>单位</span><strong id="detailUnit">-</strong></div>
              <div><span>分类</span><strong id="detailCategory">-</strong></div>
              <div><span>负责人</span><strong id="detailOwner">-</strong></div>
              <div><span>备注</span><strong id="detailNote">-</strong></div>
            </div>

            <div class="snPanel">
              <div class="sectionHeader compactHeader">
                <h2>SN码</h2>
                <span id="detailSnCount">0 条</span>
              </div>
              <div id="detailSn" class="snList">-</div>
            </div>

            <div class="actionTabs" role="tablist">
              <button id="inboundTab" class="tab active" type="button">入库</button>
              <button id="outboundTab" class="tab" type="button">出库</button>
            </div>

            <form id="movementForm" class="movementForm">
              <input id="movementType" type="hidden" value="inbound" />
              <label>
                <span>数量</span>
                <input id="quantityInput" type="number" min="1" step="1" required />
              </label>
              <label id="movementSnField">
                <span>本次SN码</span>
                <textarea id="movementSnInput" rows="3" placeholder="一行一个SN码"></textarea>
              </label>
              <label id="reasonField" class="hidden">
                <span>出库原因</span>
                <input id="reasonInput" type="text" placeholder="项目使用 / 维护 / 借用" />
              </label>
              <label>
                <span>具体信息</span>
                <textarea id="detailInput" rows="3" placeholder="用途、领用人、项目、设备编号等"></textarea>
              </label>
              <label>
                <span>操作人</span>
                <input id="operatorInput" type="text" placeholder="姓名" required />
              </label>
              <button class="submitButton" type="submit">确认提交</button>
              <p id="formStatus" class="formStatus" role="status"></p>
            </form>
          </div>
        </section>
      </section>

      <section class="chartsRow">
        <article class="chartPanel">
          <div class="sectionHeader">
            <h2>库存概览</h2>
            <span id="dataModeLabel">演示数据</span>
          </div>
          <canvas id="stockChart" width="640" height="260"></canvas>
        </article>
        <article class="recordsPanel">
          <div class="sectionHeader">
            <h2>最近出入库</h2>
          </div>
          <div id="recordList" class="recordList"></div>
        </article>
      </section>
    </main>

    <dialog id="qrDialog" class="qrDialog">
      <form method="dialog" class="settingsForm">
        <div class="sectionHeader compactHeader">
          <h2>整合二维码标签</h2>
          <button value="cancel" class="plainButton" type="submit">关闭</button>
        </div>
        <div class="qrActions">
          <button id="printQrButton" class="primaryButton" type="button">打印标签</button>
        </div>
        <div id="qrLabelSheet" class="qrLabelSheet"></div>
      </form>
    </dialog>

    <template id="itemTemplate">
      <button class="itemRow" type="button">
        <span class="itemMain">
          <strong class="itemName"></strong>
          <small class="itemCode"></small>
        </span>
        <span class="itemQty"></span>
      </button>
    </template>

    <script src="./vendor/qrcode.js?v=1.4.4"></script>
    <script src="./app.js?v=20260707-remove-api-settings-1" defer></script>
  </body>
</html>
